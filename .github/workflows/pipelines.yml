name: Run dlt and dbt Pipelines

on:
  # schedule:
  #   - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  run-pipelines:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Install UV
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: uv sync
      
      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Download DuckDB from Blob Storage
        run: |
          az storage blob download \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
            --container-name ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }} \
            --name boreas.duckdb \
            --file boreas.duckdb \
            --no-progress || echo "DuckDB not found, creating new"
      
      - name: Run dlt Pipelines
        continue-on-error: true
        working-directory: dlt
        run: uv run python run_dlt_pipelines.py
      
      - name: Upload DuckDB checkpoint after dlt
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
            --container-name ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }} \
            --name boreas.duckdb \
            --file boreas.duckdb \
            --overwrite
      
      - name: Download DuckDB checkpoint before dbt
        run: |
          az storage blob download \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
            --container-name ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }} \
            --name boreas.duckdb \
            --file boreas.duckdb \
            --overwrite \
            --no-progress
      
      - name: Install dbt packages
        run: |
          uv run dbt deps --project-dir dbt_boreas --profiles-dir dbt_boreas

      - name: Run dbt Transformations
        run: |
          uv run dbt build --project-dir dbt_boreas --profiles-dir dbt_boreas
      
      - name: Upload DuckDB to Blob Storage
        if: success()
        run: |
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
            --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
            --container-name ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }} \
            --name boreas.duckdb \
            --file boreas.duckdb \
            --overwrite
      
      - name: Notify on Failure
        if: failure()
        run: echo "Pipeline execution failed. Check logs above."
      
      - name: Azure Logout
        if: always()
        run: az logout
