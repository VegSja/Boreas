services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Mount the DuckDB database into the container (read-only)
      - ./boreas.duckdb:/app/boreas.duckdb:ro
    environment:
      - BOREAS_DB_PATH=/app/boreas.duckdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
